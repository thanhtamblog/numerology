<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thần Số Học</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Thần Số Học & Biểu Đồ Pitago</h1>

<div class="form">

<input id="name" placeholder="Nhập họ tên">

<input id="birth" type="date">

<button onclick="calculate()">Phân tích</button>

</div>

<div class="results">

<h2>Kết quả</h2>

<p>Life Path: <span id="life"></span></p>
<p>Soul Urge: <span id="soul"></span></p>
<p>Expression: <span id="expression"></span></p>
<p>Birthday: <span id="birthday"></span></p>
<p>Attitude: <span id="attitude"></span></p>
<p>Maturity: <span id="maturity"></span></p>

<p>Personal Year: <span id="personalYear"></span></p>
<p>Personal Month: <span id="personalMonth"></span></p>
<p>Personal Day: <span id="personalDay"></span></p>

</div>

<h2>Biểu đồ Pitago</h2>

<div id="pitagoChart"></div>

<div id="missingNumbers"></div>

<div id="pitagoArrows"></div>

</div>

<script src="numerology.js"></script>

</body>
</html>
