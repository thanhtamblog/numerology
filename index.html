<h1>📜 Tra cứu Nhân Số Học</h1>

<p>Khám phá ý nghĩa các con số chủ đạo trong ngày sinh và tên của bạn.</p>

<div class="form-box">

<input id="name" placeholder="Nhập họ tên của bạn">

<input id="birth" type="date">

<button onclick="calculate()">Xem kết quả</button>

<div class="grid">

<div class="card">
<h3>Số chủ đạo</h3>
<div id="life">-</div>
<a href="pages/life-path.html">Xem thêm</a>
</div>

<div id="soul">-</div>
<a href="pages/soul.html">Xem thêm</a>

<a href="pages/expression.html">Xem thêm</a>
</div>

<div class="card">
<h3>Ngày sinh</h3>
<div id="birthday">-</div>
<a href="pages/birthday.html">Xem thêm</a>
</div>

<div class="card">
<h3>Thái độ</h3>
<div id="attitude">-</div>
<a href="pages/attitude.html">Xem thêm</a>
</div>

<div class="card">
<h3>Trưởng thành</h3>
<div id="maturity">-</div>
<a href="pages/maturity.html">Xem thêm</a>
</div>

<h3>Năm cá nhân</h3>
<div id="personalYear">-</div>
</div>
</div>

<div id="pitago-grid" class="pitago-grid">

<div id="p1"></div>

<div id="p8"></div>

<div id="p3"></div>

</div>
