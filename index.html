<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>Tra cứu Nhân Số Học</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Tra cứu Nhân Số Học</h1>
<p class="subtitle">Khám phá ý nghĩa các con số chủ đạo trong ngày sinh và tên của bạn.</p>

<div class="form-box">

<input id="name" placeholder="Nhập họ tên của bạn">

<input type="date" id="birth">

<button onclick="calculate()">Xem kết quả</button>

</div>


<h2>Kết quả của bạn</h2>

<div class="results">

<div class="card">
<h3>Số chủ đạo</h3>
<div id="life">-</div>
</div>

<div class="card">
<h3>Linh hồn</h3>
<div id="soul">-</div>
</div>

<div class="card">
<h3>Biểu đạt</h3>
<div id="expression">-</div>
</div>

<div class="card">
<h3>Ngày sinh</h3>
<div id="birthday">-</div>
</div>

<div class="card">
<h3>Thái độ</h3>
<div id="attitude">-</div>
</div>

<div class="card">
<h3>Trưởng thành</h3>
<div id="maturity">-</div>
</div>

</div>


<h2>Biểu đồ Pitago</h2>

<div class="pitago-section">

<div id="pitagoChart"></div>

<div id="missingNumbers"></div>

</div>

</div>

<script src="numerology.js"></script>

</body>
</html>
